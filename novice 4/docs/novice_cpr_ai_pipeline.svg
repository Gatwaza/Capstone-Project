<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Camera captures frames, MediaPipe extracts pose landmarks, features are computed and buffered, sent to a TCN model that assesses rate, depth, and recoil, then a voice coach speaks the top-priority correction.</desc>
