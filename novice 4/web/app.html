<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0A0D0F"/>
  <title>Novice App</title>
  <base href="/"/>
  <style>
    html, body { height: 100%; margin: 0; background: #0A0D0F; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    #flutter-loading {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0A0D0F; color: #E8EAEC;
      font-family: system-ui, sans-serif;
    }
    .flutter-loader-icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: #161C20; border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .flutter-loader-icon svg { width: 28px; height: 28px; stroke: #00E5A0; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .flutter-loader-bar {
      width: 120px; height: 2px; background: rgba(255,255,255,.08);
      border-radius: 2px; overflow: hidden; margin-top: 32px;
    }
    .flutter-loader-fill {
      height: 100%; background: #00E5A0; border-radius: 2px;
      animation: loading 1.4s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0; margin-left: 100%; }
    }
  </style>
</head>
<body>

  <div id="flutter-loading">
    <div class="flutter-loader-icon">
      <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <div class="flutter-loader-bar">
      <div class="flutter-loader-fill"></div>
    </div>
  </div>

  <script>
    // ── Route from hash (set by the bridge in index.html) ──────────────
    // GoRouter reads the URL path. For iframe-based routing we convert
    // the hash fragment to a real path by rewriting history before Flutter loads.
    (function() {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#/')) {
        const path = hash.slice(1); // remove '#'
        window.history.replaceState({}, '', path);
      }
    })();

    // ── Expose close bridge back to parent ──────────────────────────────
    window.noviceClose = function() {
      window.parent.postMessage({ type: 'novice_close' }, '*');
    };

    // ── Flutter service worker and engine loader ────────────────────────
    // Standard Flutter web bootstrap — adjust _flutter.loader path if
    // your build output is in a subdirectory.
    window.addEventListener('load', function() {
      const loading = document.getElementById('flutter-loading');
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine({
            hostElement: document.body,
          });
          if (loading) loading.remove();
          await appRunner.runApp();
        }
      });
    });
  </script>
  <!-- Flutter generated scripts go here (flutter.js, main.dart.js etc) -->
  <script src="flutter.js" defer></script>
</body>
</html>
