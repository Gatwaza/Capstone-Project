<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Novice — CPR-AI Coach for Sub-Saharan Africa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Novice">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Novice — CPR Coach</title>
  <link rel="manifest" href="manifest.json">
  <!-- TensorFlow.js for web inference -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <!-- MediaPipe is loaded by flutter_pose_bridge.js — do NOT load it here -->
  <style>
    body { background-color: #0a0d0f; margin: 0; padding: 0; overflow: hidden; }
    .loading-indicator { display: none; }

    #loading {
      position: fixed; inset: 0;
      background: #0A0D0F;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      z-index: 9999;
    }
    #loading-title {
      font-family: sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #E8EAEC;
      letter-spacing: -0.5px;
    }
    #loading-subtitle {
      font-family: sans-serif;
      font-size: 13px;
      color: #5A6470;
      letter-spacing: 0.5px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #161C20;
      border-top-color: #00E5A0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading screen — removed on first Flutter frame -->
  <div id="loading">
    <div id="loading-title">Novice</div>
    <div class="spinner"></div>
    <div id="loading-subtitle">CPR Coach · Sub-Saharan Africa</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const el = document.getElementById('loading');
      if (el) {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
  <script src="flutter_pose_bridge.js"></script>
</body>
</html>
