# Web-only build (Android/iOS on hold — see lib/core/di/injection.dart header)
name: novice
description: >
  Novice — Real-time CPR coaching using pose estimation and hosted ML
  inference. Empowers bystanders in Sub-Saharan Africa. Web (mobile on hold).
version: 0.1.0+1
publish_to: none
environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  # ── Camera ────────────────────────────────────────────────
  camera: ^0.11.2+1
  # ── TTS ───────────────────────────────────────────────────
  flutter_tts: ^4.2.5
  # ── State management ──────────────────────────────────────
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # ── Dependency injection ──────────────────────────────────
  get_it: ^9.2.1
  # ── Local storage ─────────────────────────────────────────
  shared_preferences: ^2.2.3
  # ── HTTP ──────────────────────────────────────────────────
  http: ^1.2.1
  # ── Routing ───────────────────────────────────────────────
  go_router: ^17.0.0
  # ── Utilities ─────────────────────────────────────────────
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1   # downgraded from ^3.1.0
  json_annotation: ^4.9.0      # bumped to satisfy json_serializable
  intl: ^0.20.2
  logger: ^2.0.2+1
  # ── File utilities ────────────────────────────────────────
  share_plus: ^12.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # ── Code generation ───────────────────────────────────────
  build_runner: ^2.4.9         # bumped from ^2.4.8
  freezed: ^2.5.7              # downgraded from ^3.1.0
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
flutter:
  uses-material-design: true
  # NOTE: no local assets right now — audio/images/animations folders were
  # removed (nothing in the app currently loads Image.asset/AssetImage/
  # AssetSource from them; TTS uses the Web Speech API, not bundled audio).
  # The old assets/models/ entry is gone too — that only ever fed the
  # mobile TFLite path (AppConstants.tfliteModelPath), which was removed
  # along with inference_service.dart. Web inference is the hosted API
  # via InferenceServiceWeb.
  #
  # If you add real assets later, re-add an `assets:` list here pointing
  # at folders that actually exist on disk — flutter pub get / build web
  # will fail on a declared path that isn't there.