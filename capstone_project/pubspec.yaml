name: capstone_project
description: CPR AI Coach — AI-guided CPR training for Sub-Saharan Africa
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Pose Estimation ────────────────────────────────────────────────────────
  google_mlkit_pose_detection: ^0.10.0

  # ── Camera ─────────────────────────────────────────────────────────────────
  camera: ^0.10.5+9

  # ── ML Inference ───────────────────────────────────────────────────────────
  tflite_flutter: ^0.10.4

  # ── Text-to-Speech ─────────────────────────────────────────────────────────
  flutter_tts: ^4.0.2

  # ── State Management ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Dependency Injection ───────────────────────────────────────────────────
  get_it: ^7.7.0

  # ── Local Storage ──────────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0               # required by sqflite getDatabasesPath join
  shared_preferences: ^2.2.3

  # ── Google Drive ───────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  http: ^1.2.1

  # ── UI ─────────────────────────────────────────────────────────────────────
  flutter_screenutil: ^5.9.3
  lottie: ^3.1.2
  fl_chart: ^0.67.0

  # ── Utilities ──────────────────────────────────────────────────────────────
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.8
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/
    - assets/animations/
    - assets/images/
