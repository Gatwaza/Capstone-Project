# ml_pipeline/config.yaml
# Central config for CPR Coach ML training pipeline.
# Referenced by CPR_Coach_Training.ipynb.

dataset:
  drive_folder_id:   "REPLACE_WITH_YOUR_GOOGLE_DRIVE_FOLDER_ID"
  raw_video_dir:     "/content/drive/MyDrive/capstone_data/raw_videos"
  landmarks_csv:     "/content/drive/MyDrive/capstone_data/landmarks.csv"
  export_dir:        "/content/drive/MyDrive/capstone_data/exports"

classes:
  - correct_compression   # 0
  - wrong_hand_high       # 1
  - wrong_hand_low        # 2
  - bent_elbows           # 3
  - too_shallow           # 4
  - rate_too_slow         # 5
  - rate_too_fast         # 6
  - not_compressing       # 7

features:
  n_landmarks: 33
  n_features:  12
  window_size: 30          # frames per BiLSTM sequence
  fps:         25

model:
  lstm_units:   [128, 64]
  dropout:      0.40
  batch_size:   32
  epochs:       60
  lr:           0.001
  val_split:    0.15
  test_split:   0.10
  early_stop_patience: 10

export:
  tflite_filename:    "cpr_classifier.tflite"
  tfjs_dir:           "tfjs_model"
  quantize_int8:      true
