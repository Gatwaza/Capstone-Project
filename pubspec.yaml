name: capstone_project
description: AI-guided CPR First Aid Simulation Training Tool for Sub-Saharan Africa
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Pose Estimation & ML
  google_mlkit_pose_detection: ^0.10.0   # MediaPipe BlazePose — 33 landmarks offline
  tflite_flutter: ^0.10.4                # On-device CNN/LSTM inference
  tflite_flutter_helper: ^0.3.1         # Tensor helpers for TFLite

  # Camera
  camera: ^0.10.5                        # Live camera feed for pose pipeline

  # Voice / TTS
  flutter_tts: ^3.8.5                    # Offline TTS — English primary
  # Umuganda TTS: integrated via local HTTP or platform channel (see tts_service.dart)
  audioplayers: ^5.2.1                   # Option 1: pre-recorded .wav playback

  # State Management & DI
  flutter_riverpod: ^2.4.9               # Reactive state management
  riverpod_annotation: ^2.3.3
  get_it: ^7.6.7                         # Service locator / dependency injection

  # Local Storage
  sqflite: ^2.3.0                        # SQLite for session logs
  path_provider: ^2.1.1                  # File system paths
  shared_preferences: ^2.2.2            # User settings (language, onboarding)
  hive: ^2.2.3                           # Lightweight key-value store
  hive_flutter: ^1.1.0

  # Animations
  rive: ^0.12.4                          # Animated CPR instructor demo
  lottie: ^2.7.0                         # Alternative: Lottie animations

  # Networking (minimal — for optional Umuganda TTS API)
  http: ^1.1.0
  dio: ^5.4.0                            # HTTP client with interceptors

  # Utilities
  collection: ^1.18.0                    # Priority queue for feedback engine
  intl: ^0.19.0                          # Internationalization
  logger: ^2.0.2+1                       # Structured logging
  permission_handler: ^11.1.0           # Camera + mic permissions
  uuid: ^4.2.2                           # Session IDs
  equatable: ^2.0.5                      # Value equality for models
  freezed_annotation: ^2.4.1            # Immutable models
  json_annotation: ^4.8.1               # JSON serialization
  flutter_dotenv: ^5.1.0                 # .env file loading

  # UI Utilities
  gap: ^3.0.1                            # Spacing widget
  flutter_screenutil: ^5.9.0            # Responsive layout
  fl_chart: ^0.65.0                      # BPM / compression charts
  percent_indicator: ^4.2.3             # Compression fraction ring indicator
  wakelock_plus: ^1.1.4                  # Keep screen on during session

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  flutter_gen_runner: ^5.4.0             # Asset code generation

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/
    - assets/animations/
    - assets/audio/en/
    - assets/audio/rw/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700