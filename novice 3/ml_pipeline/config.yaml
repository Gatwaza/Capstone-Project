# ── Dataset ──────────────────────────────────────────────────
dataset:
  # TODO: Mount your Google Drive Sample_Dataset folder here before running
  # Expected structure:
  #   data/raw/CPR-Coach/videos/   — .mp4 files from CPR-Coach dataset
  #   data/raw/CPR-Coach/labels/   — annotation JSON files
  raw_dir:       "data/raw"
  processed_dir: "data/processed"
  landmarks_dir: "data/landmarks"   # output of extract_landmarks.py
  split:
    train: 0.70
    val:   0.15
    test:  0.15
  random_seed: 42

  # CPR-Coach error class mapping (Wang et al., 2023 / ICCV 2023)
  # Only single-error classes used for BiLSTM (not composites)
  classes:
    0: "correct_compression"
    1: "hand_too_high"       # E01
    2: "hand_too_low"        # E02
    3: "bent_elbows"         # E05
    4: "body_lean"           # E06
    5: "too_shallow"         # E07
    6: "too_deep"            # E08
    7: "incomplete_decomp"   # E09
  # Rate errors E10/E11 detected by rule-based BPM — excluded from classifier

# ── Feature engineering ───────────────────────────────────────
features:
  temporal_window: 30    # frames fed into BiLSTM
  feature_dims:    12    # must match app_constants.dart landmarkFeatureDims
  target_fps:      25
  min_visibility:  0.5   # MediaPipe landmark confidence threshold

# ── Model ─────────────────────────────────────────────────────
model:
  architecture: "bilstm"
  bilstm_units_1: 64
  bilstm_units_2: 32
  dense_units:    32
  dropout:        0.3
  num_classes:    8
  input_shape:    [30, 12]

# ── Training ──────────────────────────────────────────────────
training:
  epochs:          80
  batch_size:      64
  learning_rate:   0.001
  lr_schedule:     "cosine_decay"
  early_stopping_patience: 12
  # Weighted loss to account for class imbalance in CPR-Coach dataset
  # TODO: recompute class weights after loading full dataset
  class_weights:
    0: 1.0   # correct — most frequent class
    1: 2.5   # hand_too_high
    2: 2.5   # hand_too_low
    3: 3.0   # bent_elbows
    4: 2.0   # body_lean
    5: 3.5   # too_shallow  — most safety-critical
    6: 3.0   # too_deep
    7: 2.5   # incomplete_decomp

  augmentation:
    enabled: true
    temporal_jitter_frames: 2   # ±2 frames shift
    gaussian_noise_std: 0.02    # add to normalized landmark coords
    horizontal_flip: true       # valid for CPR — symmetric motion

# ── Evaluation targets (from research proposal) ───────────────
evaluation:
  target_f1_per_class: 0.85
  target_inference_latency_ms: 100
  target_bpm_accuracy_bpm: 5    # ±5 bpm of true rate

# ── Export ────────────────────────────────────────────────────
export:
  tflite_path:   "../assets/models/novice_cpr_classifier.tflite"
  tfjs_path:     "../web/assets/models/"
  quantization:  "int8"       # INT8 for mobile, float16 for web
  checkpoint_dir: "checkpoints/"
